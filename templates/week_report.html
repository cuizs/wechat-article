<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}}</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f5f7f9;
      font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      color: #3e3e3e;
    }

    .container {
      max-width: 860px;
      margin: 40px auto 64px;
      padding: 0 16px;
    }

    .article {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      box-shadow: 0 8px 26px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }

    .hero {
      padding: 30px 40px 22px;
      background: linear-gradient(130deg, #009688 0%, #00a9a5 90%);
      color: #fff;
    }

    .hero .kicker {
      display: inline-block;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: .9;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      padding: 4px 10px;
      margin-bottom: 14px;
    }

    .hero h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.35;
      font-weight: 700;
    }

    .hero .meta {
      margin-top: 10px;
      font-size: 14px;
      opacity: .92;
    }

    #nice {
      padding: 30px 40px 40px;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      word-break: break-all;
    }

    #nice h1 {
      font-size: 1.7em;
      font-weight: normal;
      border-bottom: 2px solid hsl(216, 100%, 68%);
    }

    #nice h1 .content {
      background: hsl(216, 100%, 68%);
      color: white;
      padding: 3px 10px;
      border-top-right-radius: 3px;
      border-top-left-radius: 3px;
      margin-right: 3px;
    }

    #nice h2 {
      font-weight: normal;
      color: #333;
      font-size: 1.4em;
      border-bottom: 1px solid hsl(216, 100%, 68%);
    }

    #nice h2 .content {
      border-bottom: 1px solid hsl(216, 100%, 68%);
    }

    #nice h3 {
      font-weight: normal;
      color: #333;
      font-size: 1.2em;
    }

    #nice h4 {
      font-weight: normal;
      font-size: 1em;
      width: 80%;
      border: 1px solid hsl(216, 100%, 68%);
      border-top: 4px solid hsl(216, 100%, 68%);
      padding: 10px;
      margin: 30px auto;
      color: #333;
    }

    #nice h5 {
      font-weight: normal;
      font-size: 1.3em;
      text-align: center;
      background: hsl(216, 100%, 68%);
      border: 3px double #fff;
      width: 80%;
      padding: 10px;
      margin: 30px auto;
      color: #fff;
    }

    #nice h6 {
      font-size: 1.5em;
      font-weight: normal;
      color: hsl(216, 100%, 68%);
      border-bottom: 1px solid hsl(216, 100%, 68%);
    }

    #nice em {
      font-style: normal;
      font-weight: normal;
      color: white;
      background: hsl(244, 100%, 75%);
      padding: 2px 4px;
      margin: 0 2px;
    }

    #nice ol,
    #nice ul {
      padding-left: 2em;
    }

    #nice blockquote {
      background: #f9f9f9;
      border-left-color: hsl(216, 100%, 68%);
    }

    #nice blockquote p {
      color: #999;
      padding: 3px 0;
    }

    #nice a {
      color: hsl(187, 100%, 45%);
      font-weight: normal;
      border-bottom-color: hsl(187, 100%, 45%);
    }

    #nice strong {
      color: hsl(216, 80%, 44%);
    }

    #nice hr {
      width: 90%;
      margin: 1.5em auto;
      border-top: 2px dashed hsl(216, 100%, 68%);
    }

    #nice img {
      width: 90%;
      margin: 0 auto;
      box-shadow: #ccc 0 10px 15px;
    }

    #nice p code, #nice li code {
      color: hsl(216, 100%, 68%);
    }

    #nice table {
      margin: 1.5em auto;
      width: auto;
    }

    #nice s,
    #nice del {
      color: #999;
    }

    #nice p,
    #nice li,
    #nice li span,
    #nice h4,
    #nice table tr td {
      color: #666;
    }

    #nice table tr th {
      color: #333;
      font-weight: normal;
    }

    #nice sup {
      line-height: 0;
    }

    #nice .footnote-word,
    #nice .footnote-ref {
      font-weight: normal;
      color: hsl(187, 100%, 45%);
    }

    #nice .footnotes-sep,
    #nice .footnote-num {
      font-family: inherit;
    }

    #nice .footnote-item p {
      color: #666;
    }

    #nice .footnote-item p em {
      color: #999;
      background: transparent;
    }

    @media (max-width: 768px) {
      .container { margin: 18px auto 28px; }
      .hero { padding: 24px 20px 20px; }
      .hero h1 { font-size: 25px; }
      #nice { padding: 22px 20px 26px; }
      #nice p {
        font-size: 15px;
        line-height: 1.7;
      }
      #nice h4,
      #nice h5 {
        width: 92%;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <article class="article">
      <header class="hero">
        <div class="kicker">Industry Weekly Brief</div>
        <h1>{{TITLE}}</h1>
        <div class="meta">生成时间：{{GENERATED_AT}}</div>
      </header>
      <section id="nice">
        {{CONTENT}}
      </section>
    </article>
  </main>
</body>
</html>
