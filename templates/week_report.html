<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}}</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f5f7f9;
      font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      color: #3e3e3e;
    }

    .container {
      max-width: 860px;
      margin: 40px auto 64px;
      padding: 0 16px;
    }

    .article {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      box-shadow: 0 8px 26px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }

    .hero {
      padding: 30px 40px 22px;
      background: linear-gradient(130deg, #009688 0%, #00a9a5 90%);
      color: #fff;
    }

    .hero .kicker {
      display: inline-block;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: .9;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      padding: 4px 10px;
      margin-bottom: 14px;
    }

    .hero h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.35;
      font-weight: 700;
    }

    .hero .meta {
      margin-top: 10px;
      font-size: 14px;
      opacity: .92;
    }

    #nice {
      padding: 30px 40px 40px;
    }

    #nice p {
      margin: 0 0 20px;
      padding: 0;
      line-height: 1.8em;
      color: #3a3a3a;
    }

    #nice h1 {
      font-size: 2.1em;
      line-height: 1.1em;
      padding-top: 16px;
      padding-bottom: 10px;
      margin-bottom: 4px;
      border-bottom: 1px solid #c99833;
    }

    #nice h1 .content {
      color: #515151;
      font-weight: 700;
    }

    #nice h2,
    #nice h3,
    #nice h4,
    #nice h5,
    #nice h6 {
      line-height: 1.5em;
      margin-top: 2.2em;
      margin-bottom: 4px;
    }

    #nice h2 {
      margin-bottom: 35px;
      display: inline-block;
      font-weight: bold;
      background: linear-gradient(#0e3a9d 90%, #ffb906 10%);
      color: #ffffff;
      padding: 2px 13px 2px;
      margin-right: 3px;
      height: 50%;
    }

    #nice h3 {
      line-height: 1.4;
      padding-top: 10px;
      margin: 10px 0 5px;
      color: #515151;
      font-weight: 700;
      font-size: 1.0em;
    }

    #nice blockquote {
      border-left-color: #ffb906;
      background: #fff5e3;
      color: #595959;
    }

    #nice a {
      border: none;
      text-decoration: none;
      color: #0e3a9d;
    }

    #nice a:hover {
      color: #0e3a9d;
      text-decoration: underline;
    }

    #nice del {
      color: #d19826;
    }

    #nice hr {
      border-top: 1px solid #0e3a9d;
      margin: 20px 0;
    }

    #nice img {
      width: 100%;
      border-radius: 5px;
      display: block;
      margin-bottom: 15px;
      height: auto;
    }

    #nice figcaption {
      color: #dda52d;
      font-size: 14px;
    }

    #nice p code, #nice li code {
      color: #9b6e23;
      background-color: #fff5e3;
      padding: 3px;
      margin: 3px;
    }

    #nice table tr th,
    #nice table tr td {
      text-align: center;
    }

    #nice .footnote-word {
      color: #ffb11b;
      padding: 3px;
    }

    #nice .footnote-ref {
      color: #dda52d;
      margin: 2px;
      padding: 3px;
    }

    #nice .footnotes-sep:before {
      margin: 30px 0 15px 0;
      font-weight: 800;
    }

    @media (max-width: 768px) {
      .container { margin: 18px auto 28px; }
      .hero { padding: 24px 20px 20px; }
      .hero h1 { font-size: 25px; }
      #nice { padding: 22px 20px 26px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <article class="article">
      <header class="hero">
        <div class="kicker">Industry Weekly Brief</div>
        <h1>{{TITLE}}</h1>
        <div class="meta">生成时间：{{GENERATED_AT}}</div>
      </header>
      <section id="nice">
        {{CONTENT}}
      </section>
    </article>
  </main>
</body>
</html>
