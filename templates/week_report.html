<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}}</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f5f7f9;
      font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      color: #3e3e3e;
    }

    .container {
      max-width: 860px;
      margin: 40px auto 64px;
      padding: 0 16px;
    }

    .article {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      box-shadow: 0 8px 26px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }

    .hero {
      padding: 30px 40px 22px;
      background: linear-gradient(130deg, #009688 0%, #00a9a5 90%);
      color: #fff;
    }

    .hero .kicker {
      display: inline-block;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: .9;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      padding: 4px 10px;
      margin-bottom: 14px;
    }

    .hero h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.35;
      font-weight: 700;
    }

    .hero .meta {
      margin-top: 10px;
      font-size: 14px;
      opacity: .92;
    }

    #nice {
      padding: 30px 40px 40px;
      line-height: 1.6;
      letter-spacing: .034em;
      color: rgb(63, 63, 63);
      font-size: 16px;
      word-break: break-all;
    }

    #nice p {
      padding-top: 23px;
      color: rgb(74, 74, 74);
      line-height: 1.75em;
    }

    #nice h1 {
      text-align: center;
      background-image: url(https://my-wechat.mdnice.com/mdnice/mountain_2_20191028221337.png);
      background-position: center top;
      background-repeat: no-repeat;
      background-size: 95px;
      line-height: 95px;
      margin-top: 38px;
      margin-bottom: 10px;
    }

    #nice h1 .content {
      font-size: 20px;
      color: rgb(60, 112, 198);
      border-bottom: 2px solid #3c7076;
    }

    #nice h2 {
      display: block;
      text-align: center;
      background-image: url(https://my-wechat.mdnice.com/mdnice/mountain_2_20191028221337.png);
      background-position: center center;
      background-repeat: no-repeat;
      background-size: 63px;
      margin-top: 38px;
      margin-bottom: 10px;
    }

    #nice h2 .content {
      text-align: center;
      display: inline-block;
      height: 38px;
      line-height: 42px;
      color: rgb(60, 112, 198);
      background-position: left center;
      background-repeat: no-repeat;
      background-size: 63px;
      margin-top: 38px;
      font-size: 18px;
      margin-bottom: 10px;
    }

    #nice h3:before {
      content: "";
      background-image: url(https://my-wechat.mdnice.com/mdnice/mountain_1_20191028221337.png);
      background-size: 15px 15px;
      display: inline-block;
      width: 15px;
      height: 15px;
      line-height: 15px;
      margin-bottom: -1px;
    }

    #nice h3 .content {
      font-size: 16px;
      font-weight: bold;
      display: inline-block;
      margin-left: 8px;
      color: rgb(60, 112, 198);
    }

    #nice blockquote {
      padding: 15px 20px;
      line-height: 27px;
      background-color: rgb(239, 239, 239);
      border-left: none;
      display: block;
    }

    #nice blockquote p {
      padding: 0;
      font-size: 15px;
      color: rgb(89, 89, 89);
    }

    #nice a {
      color: rgb(60, 112, 198);
      text-decoration: none;
      border-bottom: 1px solid rgb(60, 112, 198);
    }

    #nice strong {
      line-height: 1.75em;
      color: rgb(74, 74, 74);
    }

    #nice em strong {
      color: rgb(248, 57, 41);
      letter-spacing: 0.3em;
    }

    #nice hr {
      height: 1px;
      padding: 0;
      border: none;
      text-align: center;
      background-image: linear-gradient(to right, rgba(60, 122, 198, 0), rgba(60, 122, 198, 0.75), rgba(60, 122, 198, 0));
    }

    #nice img {
      border-radius: 4px;
      margin-bottom: 25px;
    }

    #nice figcaption {
      display: block;
      font-size: 12px;
      font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    }

    #nice p code, #nice li code {
      color: rgb(60, 112, 198);
    }

    #nice table tr th,
    #nice table tr td {
      font-size: 14px;
    }

    #nice .footnotes {
      padding-top: 8px;
    }

    #nice .footnote-word,
    #nice .footnote-ref,
    #nice .footnote-num,
    #nice .footnote-item p,
    #nice .footnote-item a {
      color: rgb(60, 112, 198);
    }

    #nice .footnote-item p {
      font-weight: bold;
    }

    #nice .footnote-item em {
      color: rgb(60, 112, 198);
      font-size: 13px;
      font-style: normal;
    }

    #nice .footnote-item p em {
      font-size: 14px;
      font-weight: normal;
      border-bottom: 1px dashed rgb(60, 112, 198);
    }

    @media (max-width: 768px) {
      .container { margin: 18px auto 28px; }
      .hero { padding: 24px 20px 20px; }
      .hero h1 { font-size: 25px; }
      #nice { padding: 22px 20px 26px; }
      #nice p {
        font-size: 15px;
        line-height: 1.7;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <article class="article">
      <header class="hero">
        <div class="kicker">Industry Weekly Brief</div>
        <h1>{{TITLE}}</h1>
        <div class="meta">生成时间：{{GENERATED_AT}}</div>
      </header>
      <section id="nice">
        {{CONTENT}}
      </section>
    </article>
  </main>
</body>
</html>
