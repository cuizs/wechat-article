<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}}</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --paper: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --brand: #0f3d66;
      --accent: #0f766e;
      --note: #eef6ff;
      --warn: #fff7ed;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top right, #dbeafe 0%, var(--bg) 42%);
      color: var(--text);
      font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      line-height: 1.82;
    }

    .container {
      max-width: 860px;
      margin: 40px auto 64px;
      padding: 0 16px;
    }

    .article {
      background: var(--paper);
      border: 1px solid #dbe2ec;
      border-radius: 18px;
      box-shadow: 0 16px 50px rgba(15, 61, 102, 0.08);
      overflow: hidden;
    }

    .hero {
      padding: 34px 40px 26px;
      background: linear-gradient(130deg, #0f3d66 0%, #134e7f 65%, #0f766e 100%);
      color: #fff;
    }

    .hero .kicker {
      display: inline-block;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: .9;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      padding: 4px 10px;
      margin-bottom: 14px;
    }

    .hero h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.35;
      font-weight: 700;
    }

    .hero .meta {
      margin-top: 10px;
      font-size: 14px;
      opacity: .92;
    }

    .content {
      padding: 30px 40px 40px;
      font-size: 16px;
    }

    .content h2 {
      margin-top: 30px;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e6edf7;
      color: var(--brand);
      font-size: 24px;
      line-height: 1.4;
    }

    .content h3 {
      margin-top: 24px;
      margin-bottom: 10px;
      color: #0f4f85;
      font-size: 19px;
    }

    .content p {
      margin: 12px 0;
      color: var(--text);
    }

    .content ul, .content ol {
      margin: 10px 0 14px;
      padding-left: 24px;
    }

    .content li {
      margin: 6px 0;
    }

    .content strong {
      color: #0b395e;
    }

    .content a {
      color: #0f5f9f;
      text-decoration: none;
      border-bottom: 1px solid rgba(15, 95, 159, .28);
    }

    .content blockquote {
      margin: 16px 0;
      padding: 14px 16px;
      border-left: 4px solid var(--accent);
      background: #f0fdfa;
      border-radius: 8px;
      color: #134e4a;
    }

    .content hr {
      border: none;
      border-top: 1px dashed #cbd5e1;
      margin: 24px 0;
    }

    .content h2 + p {
      background: var(--note);
      padding: 12px 14px;
      border: 1px solid #dbeafe;
      border-radius: 10px;
    }

    .content h2:nth-of-type(4) + h3 + ul,
    .content h2:nth-of-type(4) + h3 + ul + h3 + ul {
      background: var(--warn);
      border: 1px solid #fed7aa;
      border-radius: 10px;
      padding: 10px 14px 10px 28px;
    }

    .footer-note {
      margin-top: 30px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 768px) {
      .container { margin: 18px auto 28px; }
      .hero { padding: 24px 20px 20px; }
      .hero h1 { font-size: 25px; }
      .content { padding: 22px 20px 26px; font-size: 15px; }
      .content h2 { font-size: 21px; }
      .content h3 { font-size: 18px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <article class="article">
      <header class="hero">
        <div class="kicker">Industry Weekly Brief</div>
        <h1>{{TITLE}}</h1>
        <div class="meta">生成时间：{{GENERATED_AT}}</div>
      </header>
      <section class="content">
        {{CONTENT}}
      </section>
    </article>
  </main>
</body>
</html>
