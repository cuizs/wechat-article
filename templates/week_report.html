<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}}</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f5f7f9;
      font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      color: #3e3e3e;
    }

    .container {
      max-width: 860px;
      margin: 40px auto 64px;
      padding: 0 16px;
    }

    .article {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      box-shadow: 0 8px 26px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }

    .hero {
      padding: 30px 40px 22px;
      background: linear-gradient(130deg, #009688 0%, #00a9a5 90%);
      color: #fff;
    }

    .hero .kicker {
      display: inline-block;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: .9;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      padding: 4px 10px;
      margin-bottom: 14px;
    }

    .hero h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.35;
      font-weight: 700;
    }

    .hero .meta {
      margin-top: 10px;
      font-size: 14px;
      opacity: .92;
    }

    #nice {
      padding: 30px 40px 40px;
      font-family: "Optima-Regular", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      word-break: break-all;
    }

    #nice p {
      margin-top: 5px;
      margin-bottom: 5px;
      line-height: 26px;
      word-spacing: 3px;
      letter-spacing: 3px;
      text-align: justify;
      color: #3e3e3e;
      font-size: 16px;
      text-indent: 2em;
    }

    #nice h1 {
      font-size: 1.8em;
      color: #009688;
      margin: 1.2em auto;
      text-align: center;
      border-bottom: 1px solid #009688;
    }

    #nice h2 {
      color: #009688;
      padding-left: 10px;
      margin: 1em auto;
      border-left: 3px solid #009688;
    }

    #nice h3 {
      margin: 0.6em auto;
      padding-left: 10px;
      border-left: 2px solid #009688;
    }

    #nice h4 {
      margin: 0.6em auto;
      font-size: 1.2em;
      padding-left: 10px;
      border-left: 2px dashed #009688;
    }

    #nice h5 {
      margin: 0.6em auto;
      font-size: 1.1em;
      padding-left: 10px;
      border-left: 1px dashed #009688;
    }

    #nice h6 {
      margin: 0.6em auto;
      font-size: 1em;
      padding-left: 10px;
      border-left: 1px dotted #009688;
    }

    #nice blockquote {
      border-left: 2px solid #888;
      border-right: 2px solid #888;
      padding-left: 1em;
      color: #777;
    }

    #nice a {
      color: #009688;
      border-bottom: 1px solid #009688;
      text-decoration: none;
    }

    #nice hr {
      margin: 20px 0;
    }

    #nice p code, #nice li code {
      color: #009688;
    }

    #nice table tr th {
      border: 1px solid #009688;
      background-color: #009688;
      color: #f8f8f8;
      border-bottom: 0;
      padding: 5px 10px;
    }

    #nice table tr td {
      border: 1px solid #009688;
      padding: 5px 10px;
    }

    #nice table tr:nth-child(2n) {
      background-color: #f8f8f8;
    }

    @media (max-width: 768px) {
      .container { margin: 18px auto 28px; }
      .hero { padding: 24px 20px 20px; }
      .hero h1 { font-size: 25px; }
      #nice { padding: 22px 20px 26px; }
      #nice p {
        font-size: 15px;
        line-height: 24px;
        letter-spacing: 1px;
        word-spacing: 1px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <article class="article">
      <header class="hero">
        <div class="kicker">Industry Weekly Brief</div>
        <h1>{{TITLE}}</h1>
        <div class="meta">生成时间：{{GENERATED_AT}}</div>
      </header>
      <section id="nice">
        {{CONTENT}}
      </section>
    </article>
  </main>
</body>
</html>
